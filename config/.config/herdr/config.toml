# herdr config — https://herdr.dev/docs/configuration/
# Only overrides are listed; everything else stays at herdr's defaults.

[keys]
# tmux と同じ prefix (C-w) に合わせる。
prefix = "ctrl+w"

# tmux では C-Tab / C-BTab で window を切り替えていた。
# herdr の tab がそれに相当するので、prefix なしの直接バインドを追加する
# (prefix+n / prefix+p のデフォルトも配列で残す)。
# 注: C-Tab を届けるには WezTerm 側の CSI-u 設定が必要で、herdr が
#     そのシーケンスを解釈するかは要確認 (効かなければこの2行を消す)。
next_tab = ["prefix+n", "ctrl+tab"]
previous_tab = ["prefix+p", "ctrl+shift+tab"]

# --- tmux default 互換レイヤ -------------------------------------------
# prefix は C-w のまま、pane/window/session 操作を tmux デフォルトに寄せる。
# tmux に無い herdr 固有機能で衝突するものは tmux 優先で別キーへ退避した:
#   通知(o→shift+o) / 設定(s→shift+s) / detach(q→d)。
# tmux に相当機能が無いもの (ペイン番号ジャンプ prefix+q, レイアウト循環,
# swap/break pane 等) は再現していない。

# pane 分割 (tmux: %=左右, "=上下)。herdr の split_vertical/horizontal の向きが
# tmux と逆なら % と " を入れ替える (実機で1回確認)。
split_vertical = 'prefix+%'      # 左右分割
split_horizontal = 'prefix+"'    # 上下分割

# pane 移動は矢印のみ (herdr default の hjkl は外す)
focus_pane_left = "prefix+left"
focus_pane_down = "prefix+down"
focus_pane_up = "prefix+up"
focus_pane_right = "prefix+right"

# pane 巡回 (tmux: o) / 直前 pane (tmux: ;)
cycle_pane_next = "prefix+o"
last_pane = "prefix+;"

# window(=tab) 操作 (tmux: ,=rename, &=kill)。c/n/p/z/x/1..9 は herdr default が既に一致。
rename_tab = "prefix+,"
close_tab = "prefix+&"

# session(=workspace) 選択 (tmux: s = choose-session)
workspace_picker = "prefix+s"

# detach (tmux: d)。herdr default の prefix+q から移動し q は解放。
detach = "prefix+d"

# 退避先 (tmux に無い herdr 固有機能。tmux が使うキーを避ける)
settings = "prefix+shift+s"
open_notification_target = "prefix+shift+o"
# ----------------------------------------------------------------------

# 全 repo × 全 worktree から選んで、その worktree の space に switch (無ければ作る)。
[[keys.command]]
key = "ctrl+]"
type = "pane"
command = "herdr-worktree-switch"

[ui]
agent_panel_sort = "spaces"

# サイドバーを既定(26)の約1.5倍に。名前長で min..max の範囲を自動スケールするので、
# 上限(既定36)も上げないと 39 で頭打ちになる。
sidebar_width = 39
sidebar_max_width = 40

# モバイル端末で幅が広めでもサイドバーを畳んで単一カラムにしたい。
# この桁数以下だとモバイルレイアウト(サイドバー非表示)になる。default は 64。
# iPhone 17 の Termius 最小フォントサイズで幅 81 桁だったので、それを確実に含むよう
# 少し余裕を持たせて 100 に設定 (フォント調整で幅が増えても判定が外れにくい)。
mobile_width_threshold = 100

# tmux の prefix+c のように、名前入力なしで即 tab を作る。
prompt_new_tab_name = false

[update]
# バイナリは aqua(+Renovate) で管理するので、herdr 自身の版チェック/自己更新は無効化。
# (`herdr update` は叩かない。aqua 管理とドリフトするため)
version_check = false
# manifest_check はデフォルト(true)のまま: agent 検出ルールは本体更新と別軸で最新化される。

[experimental]
# prefix モード中だけ macOS の入力ソースを ASCII に一時切替。日本語 IME オン中でも
# prefix コマンド (prefix→c 等) が IME に食われず通る。抜けたら元の入力ソースに戻す。
switch_ascii_input_source_in_prefix = true
