views:
  main:
    union:
      - worktree
      - sessions
      - ssh
      - ssh-session

  sessions:
    steps:
      - name: session
        sources:
          - list: |
              tmux list-sessions -F "#{session_last_attached} #{session_path}" | sort -rn | cut -d' ' -f2
            display: "printf '\\033[34m\\033[39m '; ~/.config/tmux/dirmux/path-to-name.sh {}"
            preview: "tmux capture-pane -ep -t $(tmux list-panes -a -F '#{pane_id} #{session_path}' | awk -v p='{}' '$2==p{print $1;exit}')"
          - list: ghq list --full-path | roots --depth 4 --root-file .git
            display: "printf '\\033[36m\\033[39m '; ~/.config/tmux/dirmux/path-to-name.sh {}"
            preview: eza --tree --icons --color=always --level 3 {}
    run: tsuimux open $session --name "$(~/.config/tmux/dirmux/path-to-name.sh $session)"

  ssh:
    steps:
      - name: host
        sources:
          - list: ~/.config/tuicast/list-ssh-hosts.sh
            display: "printf ' %s\\n' {}"
            preview: ssh -G {} 2>/dev/null | grep -iE '^(hostname|user|port|identityfile) '
    run: ~/.config/tuicast/ssh-connect.sh $host

  # Pick a remote tmux session in one shot: "<host> <session>".
  # The list fans out to every host in parallel (see list-ssh-sessions.sh).
  ssh-session:
    steps:
      - name: target
        sources:
          - list: ~/.config/tuicast/list-ssh-sessions.sh
            display: "printf '\\033[35m\\356\\254\\272\\033[39m %s\\n' {}"
    run: ~/.config/tuicast/ssh-session-connect.sh $target

  worktree:
    steps:
      - name: repo
        sources:
          - list: ghq list --full-path
            display: ~/.config/tmux/dirmux/path-to-name.sh {}
      - name: branch
        sources:
          - label: "✨ Create new branch"
            input: "Branch name"
          - list: git -C $repo branch -a --sort=-committerdate --format='%(refname:short)' | grep -v HEAD
            preview: git -C $repo log --oneline -10 {} 2>/dev/null
    run: ~/.config/tuicast/worktree-create.sh "$repo" "$branch"
